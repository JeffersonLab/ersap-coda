---
io-services:
  reader:
    class: org.jlab.ersap.coda.engines.AggFileReaderEngine
    name: AggSource
  writer:
    class: org.jlab.ersap.coda.engines.AggStoreHistogramEngine
    name: AggSync
services:
#  - class: org.jlab.ersap.coda.engines.FAdcEvtIdentifyEngine
#    name: AggProcessor
  - class: org.jlab.ersap.coda.engines.FAdcHitsEngine
    name: SimpleProcessor
configuration:
  io-services:
    writer:
      frame_title: "ERSAP"
      frame_width: 1400
      frame_height: 1200
      # hist_titles is a string containing the list of crate-slot-channel separated by ,
      hist_titles: "1-17-0, 1-17-1, 1-17-2, 1-17-3, 1-17-4, 1-17-5, 1-17-6, 1-17-7, 1-17-8, 1-17-9, 1-17-10, 1-17-11, 1-17-12, 1-17-13, 1-17-14, 1-17-15, 1-19-0, 1-19-1, 1-19-2, 1-19-3, 1-19-4, 1-19-5, 1-19-6, 1-19-7, 1-19-8"
      hist_bins: 100
      hist_min: 0
      hist_max: 9000
      scatter_reset: true
      # grid_size defines a layout for histogram visualization
      # (e.g. 5 will plot 25 histograms in 5x5 matrix)
      grid_size: 5
  services:
    SimpleProcessor:
      t_slot: 17
      t_channel: 14
#    AggProcessor:
#      sliding_widow_size: 32
#      sliding_step: 4
#  beam_center is a string: crate_slot_channel.
#  If not defined (commented out) algorithm will not consider a cell with a max charge
#      beam_center: "1-3-12"
mime-types:
  - binary/data-evio
  - binary/data-jobj
